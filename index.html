<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钉钉AI咨询研究院 - 课程系统</title>
    <link rel="stylesheet" href="common-styles.css">
    <style>
        /* 简单的加载动画 */
        .loading-spinner {
            text-align: center;
            padding: 50px;
            color: var(--dt-text-secondary);
        }
        
        /* 右下角浮动工具栏 */
        .floating-toolbar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toolbar-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .toolbar-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.2);
        }
        
        .toolbar-item svg {
            width: 24px;
            height: 24px;
            stroke: #333;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* 咨询按钮特殊样式 */
        .toolbar-item.consult-btn {
            background: linear-gradient(135deg, #E8F0FE, #D4E4FC);
        }
        
        .toolbar-item.consult-btn svg {
            stroke: #1677FF;
        }
        
        .toolbar-item.consult-btn:hover {
            background: linear-gradient(135deg, #D4E4FC, #BFD8FC);
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.3);
        }
        
        /* 左侧弹出提示框 */
        .consult-popup {
            position: absolute;
            right: 68px;
            bottom: -20px;
            background: #ffffff;
            border-radius: 12px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            width: 240px;
        }
        
        .toolbar-item.consult-btn:hover .consult-popup {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .consult-popup::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 8px solid #ffffff;
        }
        
        .consult-popup img {
            width: 196px;
            height: 196px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px;
            border-radius: 8px;
        }
        
        .consult-popup-text {
            text-align: center;
            font-size: 14px;
            color: #1677FF;
            line-height: 1.6;
            font-weight: 500;
            word-wrap: break-word;
            white-space: normal;
        }
        
        /* 二维码放大弹窗 */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .qr-modal-overlay.active {
            display: flex;
        }
        
        .qr-modal-content {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
            max-height: 90vh;
            animation: qrZoomIn 0.3s ease;
        }
        
        @keyframes qrZoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .qr-modal-content img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            display: block;
        }
        
        .qr-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #333;
            transition: all 0.3s ease;
        }
        
        .qr-modal-close:hover {
            background: #ffffff;
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-logo" onclick="switchMainTab('home')">
                <img src="https://gw.alicdn.com/imgextra/i1/O1CN01U94gre1ZwfvJk8ik1_!!6000000003259-2-tps-163-80.png" alt="钉钉Logo" class="dingtalk-logo-img">
                <span class="logo-text-institute">AI咨询研究院  |  课程系统</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="home" onclick="switchMainTab('home')">首页</button>
                <button class="nav-tab" data-tab="public" onclick="switchMainTab('public')">公开课</button>
                <button class="nav-tab" data-tab="enterprise" onclick="switchMainTab('enterprise')">企业定制课程</button>
                <button class="nav-tab" data-tab="online" onclick="switchMainTab('online')">线上课程</button>
                <button class="nav-tab" data-tab="about" onclick="switchMainTab('about')">关于我们</button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 (动态加载容器) -->
    <div id="main-content-area" class="main-content">
        <!-- 内容将通过 JS 动态注入 -->
    </div>

    <script id="main-script" data-version="20260605-1600">
        // 缓存已加载的内容，避免重复请求
        const contentCache = {};
        

        async function switchMainTab(tabId) {
            const container = document.getElementById('main-content-area');
            
            // 确保主内容区可见
            if (container) container.style.display = 'block';
            
            // 1. 更新导航栏状态
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('active');
                }
            });

            
            // 2. 如果已经缓存过，直接显示并重新初始化轮播和热门课程滚动
            if (contentCache[tabId]) {
                container.innerHTML = contentCache[tabId];
                initCarousels();
                initHotCoursesScroll();
                return;
            }

            // 3. 显示加载中
            container.innerHTML = '<div class="loading-spinner">正在加载内容...</div>';

            try {
                // 4. 获取对应的 HTML 文件
                const response = await fetch(`tab-${tabId}.html`);
                if (!response.ok) throw new Error('加载失败');
                const html = await response.text();
                
                // 5. 缓存并渲染
                contentCache[tabId] = html;
                container.innerHTML = html;
                
                // 6. 手动执行插入内容中的 <script> 标签
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    if (oldScript.textContent) {
                        newScript.textContent = oldScript.textContent;
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                
                // 7. 初始化轮播图和热门课程滚动
                initCarousels();
                initHotCoursesScroll();
                initReviewScroll();
                
                // 8. 自动滚动到页面顶端
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loading-spinner">内容加载出错，请刷新页面重试。</div>';
            }
        }
        
        // 轮播图初始化函数
        function initCarousels() {
            const carousels = document.querySelectorAll('.carousel-wrapper');
            
            carousels.forEach(carousel => {
                // 避免重复初始化
                if (carousel.dataset.initialized === 'true') return;
                carousel.dataset.initialized = 'true';
                
                const track = carousel.querySelector('.carousel-track');
                const dots = carousel.querySelectorAll('.dot');
                const images = track.querySelectorAll('img');
                let currentIndex = 0;
                let autoPlayTimer;
                
                function goTo(index) {
                    currentIndex = index;
                    track.style.transform = `translateX(-${index * 100}%)`;
                    dots.forEach((dot, i) => {
                        dot.classList.toggle('active', i === index);
                    });
                }
                
                function startAutoPlay() {
                    stopAutoPlay();
                    autoPlayTimer = setInterval(() => {
                        const nextIndex = (currentIndex + 1) % images.length;
                        goTo(nextIndex);
                    }, 4000);
                }
                
                function stopAutoPlay() {
                    clearInterval(autoPlayTimer);
                }
                
                dots.forEach(dot => {
                    dot.addEventListener('click', () => {
                        const index = parseInt(dot.dataset.index);
                        goTo(index);
                        stopAutoPlay();
                        startAutoPlay();
                    });
                });
                
                carousel.addEventListener('mouseenter', stopAutoPlay);
                carousel.addEventListener('mouseleave', startAutoPlay);
                
                startAutoPlay();
            });
        }
        
        // 热门课程横向滚动初始化
        function initHotCoursesScroll() {
            const leftBtn = document.getElementById('hotScrollLeft');
            const rightBtn = document.getElementById('hotScrollRight');
            const track = document.getElementById('hotCoursesTrack');
            
            if (!leftBtn || !rightBtn || !track) return;
            
            // 避免重复绑定
            if (leftBtn.dataset.bound === 'true') return;
            leftBtn.dataset.bound = 'true';
            rightBtn.dataset.bound = 'true';
            
            let scrollPos = 0;
            const cardWidth = 300; // 卡片宽度 + gap
            
            leftBtn.addEventListener('click', () => {
                scrollPos = Math.max(0, scrollPos - cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            rightBtn.addEventListener('click', () => {
                const maxScroll = track.scrollWidth - track.clientWidth;
                scrollPos = Math.min(maxScroll, scrollPos + cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            // 同步滚动位置（用户手动拖动时）
            track.addEventListener('scroll', () => {
                scrollPos = track.scrollLeft;
            });
        }

        // 精彩回顾横向滚动初始化
        function initReviewScroll() {
            const leftBtn = document.getElementById('reviewScrollLeft');
            const rightBtn = document.getElementById('reviewScrollRight');
            const track = document.getElementById('reviewTrack');
            
            if (!leftBtn || !rightBtn || !track) return;
            
            // 避免重复绑定
            if (leftBtn.dataset.bound === 'true') return;
            leftBtn.dataset.bound = 'true';
            rightBtn.dataset.bound = 'true';
            
            let scrollPos = 0;
            const cardWidth = 344; // 图片卡片宽度320px + gap 24px
            
            leftBtn.addEventListener('click', () => {
                scrollPos = Math.max(0, scrollPos - cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            rightBtn.addEventListener('click', () => {
                const maxScroll = track.scrollWidth - track.clientWidth;
                scrollPos = Math.min(maxScroll, scrollPos + cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            // 同步滚动位置（用户手动拖动时）
            track.addEventListener('scroll', () => {
                scrollPos = track.scrollLeft;
            });
        }

        // 页面初始化时默认加载首页，支持URL hash导航
        window.onload = () => {
            const hash = window.location.hash.substring(1); // 移除#号
            
            // 检查是否是带领域的企业定制课程hash（如 enterprise-chain-stores）
            if (hash && hash.startsWith('enterprise-')) {
                const domainId = hash.replace('enterprise-', '');
                
                // 先切换到企业定制课程Tab
                switchMainTab('enterprise');
                
                // 等待Tab内容加载完成后，激活对应的领域Tab并滚动到该区域
                setTimeout(() => {
                    activateEnterpriseDomain(domainId);
                }, 500);
            } else {
                const targetTab = ['home', 'public', 'enterprise', 'online', 'about'].includes(hash) ? hash : 'home';
                switchMainTab(targetTab);
            }
        };
        
        // 激活企业定制课程的指定领域Tab
        function activateEnterpriseDomain(domainId) {
            // 领域ID到Tab按钮索引的映射
            const domainIndexMap = {
                'manufacturing': 0,      // 制造业&电商
                'chain-stores': 1,       // 连锁门店
                'marketing': 2,          // 大营销
                'strategy': 3,           // 战略与经营管理
                'talent-finance': 4,     // 人才组织发展与财务&教培金融
                'management': 5          // 通用管理领导力与办公提效
            };
            
            const tabIndex = domainIndexMap[domainId];
            if (tabIndex === undefined) return;
            
            // 获取所有Tab按钮和内容块
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');
            
            if (!tabButtons[tabIndex] || !tabContents[tabIndex]) return;
            
            // 切换Tab
            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));
            
            tabButtons[tabIndex].classList.add('active');
            tabContents[tabIndex].classList.add('active');
            
            // 滚动到该领域区域
            tabContents[tabIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>

    
    <script>
        function toggleFaq(element) {
            element.classList.toggle('active');

    </script>

    </footer>

        <div class="toolbar-item" title="意见反馈">

                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            
            <!-- 左侧弹出提示框 -->
            <div class="consult-popup">
                <img src="https://gw.alicdn.com/imgextra/i1/O1CN016CfrfB1ojaqRMGryd_!!6000000005261-2-tps-544-544.png" alt="课程合作二维码">
                <div class="consult-popup-text">
                    课程合作<br>钉钉扫码咨询
                </div>
            </div>
        </div>
    </div>

</body>
