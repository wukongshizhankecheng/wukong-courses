<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钉钉AI咨询研究院 - 课程系统</title>
    <link rel="stylesheet" href="common-styles.css">
    <style>
        /* 简单的加载动画 */
        .loading-spinner {
            text-align: center;
            padding: 50px;
            color: var(--dt-text-secondary);
        }
        
        /* 右下角浮动工具栏 */
        .floating-toolbar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toolbar-item {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .toolbar-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.2);
        }
        
        .toolbar-item svg {
            width: 24px;
            height: 24px;
            stroke: #333;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* 咨询按钮特殊样式 */
        .toolbar-item.consult-btn {
            background: linear-gradient(135deg, #E8F0FE, #D4E4FC);
        }
        
        .toolbar-item.consult-btn svg {
            stroke: #1677FF;
        }
        
        .toolbar-item.consult-btn:hover {
            background: linear-gradient(135deg, #D4E4FC, #BFD8FC);
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.3);
        }
        
        /* 左侧弹出提示框 */
        .consult-popup {
            position: absolute;
            right: 68px;
            bottom: -20px;
            background: #ffffff;
            border-radius: 12px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            width: 240px;
        }
        
        .toolbar-item.consult-btn:hover .consult-popup {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .consult-popup::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 8px solid #ffffff;
        }
        
        .consult-popup img {
            width: 196px;
            height: 196px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px;
            border-radius: 8px;
        }
        
        .consult-popup-text {
            text-align: center;
            font-size: 14px;
            color: #1677FF;
            line-height: 1.6;
            font-weight: 500;
            word-wrap: break-word;
            white-space: normal;
        }
        
        /* 二维码放大弹窗 */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .qr-modal-overlay.active {
            display: flex;
        }
        
        .qr-modal-content {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
            max-height: 90vh;
            animation: qrZoomIn 0.3s ease;
        }
        
        @keyframes qrZoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .qr-modal-content img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            display: block;
        }
        
        .qr-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #333;
            transition: all 0.3s ease;
        }
        
        .qr-modal-close:hover {
            background: #ffffff;
            transform: rotate(90deg);
        }
        
        /* 移动端浮动工具栏缩小 */
        @media (max-width: 768px) {
            .floating-toolbar {
                bottom: 16px;
                right: 16px;
                gap: 8px;
            }
            .toolbar-item {
                width: 44px;
                height: 44px;
            }
            .toolbar-item svg {
                width: 18px;
                height: 18px;
            }
            .consult-popup {
                right: 56px;
                bottom: -10px;
                width: 200px;
                padding: 16px 14px;
            }
            .consult-popup img {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-logo" onclick="switchMainTab('home')">
                <img src="https://gw.alicdn.com/imgextra/i1/O1CN01U94gre1ZwfvJk8ik1_!!6000000003259-2-tps-163-80.png" alt="钉钉Logo" class="dingtalk-logo-img">
                <span class="logo-text-institute">AI咨询研究院  |  课程系统</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="home" onclick="switchMainTab('home')">首页</button>
                <button class="nav-tab" data-tab="public" onclick="switchMainTab('public')">公开课</button>
                <button class="nav-tab" data-tab="enterprise" onclick="switchMainTab('enterprise')">企业定制课程</button>
                <button class="nav-tab" data-tab="online" onclick="switchMainTab('online')">线上课程</button>
                <button class="nav-tab" data-tab="about" onclick="switchMainTab('about')">关于我们</button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 (动态加载容器) -->
    <div id="main-content-area" class="main-content">
        <!-- 内容将通过 JS 动态注入 -->
    </div>

    <script id="main-script" data-version="20260611-1500">
        // 缓存已加载的内容，避免重复请求
        const contentCache = {};
        

        // 公开课筛选功能 - 全局变量和函数（避免闭包导致的事件监听器问题）
        const publicFilterCityMap = {
            'hangzhou': '杭州',
            'guangzhou': '广州',
            'chengdu': '成都',
            'hefei': '合肥',
            'yiwu': '义乌'
        };
        
        const publicFilterMonthMap = {
            'may': '5月',
            'june': '6月',
            'july': '7月'
        };
        
        let publicFilterInitialized = false;
        
        function publicFilterCourses() {
            const keywordInput = document.querySelector('.filter-input');
            const selects = document.querySelectorAll('.filter-select');
            const keyword = (keywordInput ? keywordInput.value : '').trim().toLowerCase();
            
            const categoryVal = selects[0] ? selects[0].value : '';
            const audienceVal = selects[1] ? selects[1].value : '';
            const cityVal = selects[2] ? selects[2].value : '';
            const timeVal = selects[3] ? selects[3].value : '';
            
            const cityText = publicFilterCityMap[cityVal] || '';
            const monthText = publicFilterMonthMap[timeVal] || '';
            
            const items = document.querySelectorAll('.course-list-item');
            let visibleCount = 0;
            
            items.forEach(function(item) {
                const title = item.querySelector('.course-title');
                const subtitle = item.querySelector('.course-subtitle');
                const metaItems = item.querySelectorAll('.meta-item');
                
                const titleText = title ? title.textContent.toLowerCase() : '';
                const subtitleText = subtitle ? subtitle.textContent.toLowerCase() : '';
                
                let unitText = '', instructorText = '', cityItemText = '', timeItemText = '';
                metaItems.forEach(function(meta) {
                    const text = meta.textContent;
                    if (text.indexOf('开课单位') !== -1) unitText = text;
                    else if (text.indexOf('授课讲师') !== -1) instructorText = text;
                    else if (text.indexOf('开课城市') !== -1) cityItemText = text;
                    else if (text.indexOf('开课时间') !== -1) timeItemText = text;
                });
                
                let matchKeyword = true;
                if (keyword) {
                    matchKeyword = titleText.indexOf(keyword) !== -1 || 
                                   subtitleText.indexOf(keyword) !== -1 ||
                                   unitText.toLowerCase().indexOf(keyword) !== -1 ||
                                   instructorText.toLowerCase().indexOf(keyword) !== -1;
                }
                
                let matchCategory = true;
                if (categoryVal && categoryVal !== 'all') {
                    const categoryKeywords = {
                        'ai-transformation': ['AI转型', 'AI时代'],
                        'management': ['破界者', 'CEO专场', '增长实战营', '新篇章', '餐饮连锁'],
                        'hr': ['HR实战营', '人力资源'],
                        'ecommerce': ['电商', '运营']
                    };
                    const keywords = categoryKeywords[categoryVal] || [];
                    matchCategory = keywords.some(function(kw) {
                        return titleText.indexOf(kw.toLowerCase()) !== -1;
                    });
                }
                
                let matchAudience = true;
                if (audienceVal && audienceVal !== 'all') {
                    const audienceKeywords = {
                        'ceo': ['CEO', '决策者', '破界者'],
                        'manager': ['管理者', '管理'],
                        'hr': ['HR', '人力'],
                        'operator': ['运营', '实操']
                    };
                    const keywords = audienceKeywords[audienceVal] || [];
                    matchAudience = keywords.some(function(kw) {
                        return titleText.indexOf(kw.toLowerCase()) !== -1 || 
                               subtitleText.indexOf(kw.toLowerCase()) !== -1;
                    });
                }
                
                let matchCity = true;
                if (cityText && cityVal !== 'all') {
                    matchCity = cityItemText.indexOf(cityText) !== -1;
                }
                
                let matchTime = true;
                if (monthText && timeVal !== 'all') {
                    matchTime = timeItemText.indexOf(monthText) !== -1;
                }
                
                const show = matchKeyword && matchCategory && matchAudience && matchCity && matchTime;
                item.style.display = show ? '' : 'none';
                if (show) visibleCount++;
            });
            
            let noResultMsg = document.getElementById('filter-no-result');
            if (!noResultMsg) {
                noResultMsg = document.createElement('div');
                noResultMsg.id = 'filter-no-result';
                noResultMsg.style.cssText = 'text-align:center;padding:40px 20px;color:#999;font-size:15px;display:none;';
                noResultMsg.textContent = '未找到匹配的课程，请调整筛选条件';
                var container = document.querySelector('.course-list-container');
                if (container) container.parentNode.insertBefore(noResultMsg, container.nextSibling);
            }
            noResultMsg.style.display = visibleCount === 0 ? 'block' : 'none';
            
            // 筛选后重新排序可见课程
            sortCourseList();
        }
        
        // 公开课筛选功能初始化
        function initPublicFilter() {
            // 如果已经初始化过，直接返回（避免重复绑定事件）
            if (publicFilterInitialized) {
                // 即使已初始化，也要重新排序（因为内容重新注入了）
                sortCourseList();
                return;
            }
            
            // 绑定事件
            var keywordInput = document.querySelector('.filter-input');
            if (keywordInput) {
                keywordInput.addEventListener('input', publicFilterCourses);
            }
            
            var selects = document.querySelectorAll('.filter-select');
            selects.forEach(function(sel) {
                sel.addEventListener('change', publicFilterCourses);
            });
            
            var clearBtn = document.querySelector('.filter-clear-btn');
            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    // 清空输入框
                    var input = document.querySelector('.filter-input');
                    if (input) input.value = '';
                    
                    // 重置所有下拉框到placeholder状态
                    var allSelects = document.querySelectorAll('.filter-select');
                    allSelects.forEach(function(sel) {
                        sel.selectedIndex = 0;
                    });
                    
                    // 重新执行筛选（显示所有课程）并重新排序
                    publicFilterCourses();
                    sortCourseList();
                });
            }
            
            publicFilterInitialized = true;
            
            // 首次初始化也要排序
            sortCourseList();
        }
        
        // 课程列表按开课时间排序（最近日期在前，已过期排末尾）
        function sortCourseList() {
            var container = document.querySelector('.course-list-container');
            if (!container) return;
            
            var items = Array.from(container.querySelectorAll('.course-list-item'));
            if (items.length === 0) return;
            
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            
            items.sort(function(a, b) {
                var dateStrA = a.getAttribute('data-start-date');
                var dateStrB = b.getAttribute('data-start-date');
                
                var dateA = dateStrA ? new Date(dateStrA) : new Date(0);
                var dateB = dateStrB ? new Date(dateStrB) : new Date(0);
                
                var isPastA = dateA < today;
                var isPastB = dateB < today;
                
                // 已过期课程排在最后
                if (isPastA && !isPastB) return 1;
                if (!isPastA && isPastB) return -1;
                
                // 未来课程按时间降序（最远的在前）
                // 已过期课程按时间降序（最近过期的在前）
                if (isPastA && isPastB) {
                    return dateB - dateA;
                }
                return dateB - dateA;
            });
            
            // 重新排列 DOM 顺序
            items.forEach(function(item) {
                container.appendChild(item);
            });
        }
        
        // Tab切换主函数
        async function switchMainTab(tabId) {
            const container = document.getElementById('main-content-area');
            
            // 确保主内容区可见
            if (container) container.style.display = 'block';
            
            // 1. 更新导航栏状态
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('active');
                }
            });

            
            // 2. 显示加载中（禁用缓存，确保始终加载最新内容）
            container.innerHTML = '<div class="loading-spinner">正在加载内容...</div>';

            try {
                // 4. 获取对应的 HTML 文件（添加时间戳破坏缓存）
                const timestamp = new Date().getTime();
                const response = await fetch(`tab-${tabId}.html?t=${timestamp}`);
                if (!response.ok) throw new Error('加载失败');
                const html = await response.text();
                
                // 5. 缓存并渲染
                contentCache[tabId] = html;
                container.innerHTML = html;
                
                // 6. 手动执行插入内容中的 <script> 标签
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    if (oldScript.textContent) {
                        newScript.textContent = oldScript.textContent;
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                
                // 7. 初始化轮播图和精彩回顾滚动
                setTimeout(() => {
                    try { initBanner(); } catch(e) { console.error('[Banner] init error:', e); }
                    try { initCarousels(); } catch(e) { console.error('[Carousels] init error:', e); }
                    try { initReviewScroll(); } catch(e) { console.error('[Review] init error:', e); }
                    // initHotCoursesScroll 已注释掉（热门课程模块暂不启用）
                }, 100);
                
                // 8. 初始化公开课筛选功能 + 按时间排序
                if (tabId === 'public') {
                    setTimeout(initPublicFilter, 50);
                }
                
                // 9. 自动滚动到页面顶端
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loading-spinner">内容加载出错，请刷新页面重试。</div>';
            }
        }
        
        // 轮播图初始化函数
        function initCarousels() {
            const carousels = document.querySelectorAll('.carousel-wrapper');
            
            carousels.forEach(carousel => {
                // 避免重复初始化
                if (carousel.dataset.initialized === 'true') return;
                carousel.dataset.initialized = 'true';
                
                const track = carousel.querySelector('.carousel-track');
                const dots = carousel.querySelectorAll('.dot');
                const images = track.querySelectorAll('img');
                let currentIndex = 0;
                let autoPlayTimer;
                
                function goTo(index) {
                    currentIndex = index;
                    track.style.transform = `translateX(-${index * 100}%)`;
                    dots.forEach((dot, i) => {
                        dot.classList.toggle('active', i === index);
                    });
                }
                
                function startAutoPlay() {
                    stopAutoPlay();
                    autoPlayTimer = setInterval(() => {
                        const nextIndex = (currentIndex + 1) % images.length;
                        goTo(nextIndex);
                    }, 4000);
                }
                
                function stopAutoPlay() {
                    clearInterval(autoPlayTimer);
                }
                
                dots.forEach(dot => {
                    dot.addEventListener('click', () => {
                        const index = parseInt(dot.dataset.index);
                        goTo(index);
                        stopAutoPlay();
                        startAutoPlay();
                    });
                });
                
                carousel.addEventListener('mouseenter', stopAutoPlay);
                carousel.addEventListener('mouseleave', startAutoPlay);
                
                startAutoPlay();
            });
        }
        
        
        // Banner 全屏滚动初始化（无缝循环）
        function initBanner() {
            var track = document.getElementById('bannerTrack');
            if (!track) return;

            var dots = document.querySelectorAll('.banner-dot');
            if (dots.length === 0) return;

            // 避免重复初始化
            if (track.dataset.bannerInitialized === 'true') return;
            track.dataset.bannerInitialized = 'true';

            var totalOriginal = 4;
            var currentIndex = 0;
            var autoPlayTimer;
            var isTransitioning = false;

            // 克隆所有 slide 追加到末尾，实现无缝循环
            var slides = track.querySelectorAll('.banner-slide');
            for (var i = 0; i < slides.length; i++) {
                var clone = slides[i].cloneNode(true);
                track.appendChild(clone);
            }
            // 现在 track 有 8 个 slide：[0,1,2,3,0,1,2,3]

            function goToSlide(index, animate) {
                if (animate === undefined) animate = true;
                track.style.transition = animate ? 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)' : 'none';
                track.style.transform = 'translateX(-' + (index * 12.5) + '%)';
            }

            function updateDots(realIndex) {
                var dotIndex = realIndex % totalOriginal;
                for (var i = 0; i < dots.length; i++) {
                    if (i === dotIndex) {
                        dots[i].classList.add('active');
                    } else {
                        dots[i].classList.remove('active');
                    }
                }
            }

            function startAutoPlay() {
                stopAutoPlay();
                autoPlayTimer = setInterval(function() {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    currentIndex++;
                    goToSlide(currentIndex);
                    updateDots(currentIndex);

                    // 当滚到克隆的第1屏（索引4）时，瞬间跳回真正的第1屏（索引0）
                    setTimeout(function() {
                        if (currentIndex >= totalOriginal) {
                            currentIndex = currentIndex % totalOriginal;
                            goToSlide(currentIndex, false);
                            updateDots(currentIndex);
                        }
                        isTransitioning = false;
                    }, 650);
                }, 5000);
            }

            function stopAutoPlay() {
                clearInterval(autoPlayTimer);
            }

            // 指示点点击
            for (var d = 0; d < dots.length; d++) {
                (function(dot, idx) {
                    dot.addEventListener('click', function() {
                        if (isTransitioning) return;
                        isTransitioning = true;
                        currentIndex = idx;
                        goToSlide(currentIndex);
                        updateDots(currentIndex);
                        stopAutoPlay();
                        startAutoPlay();
                        setTimeout(function() { isTransitioning = false; }, 650);
                    });
                })(dots[d], d);
            }

            // 左右箭头
            var prevBtn = document.querySelector('.banner-prev');
            var nextBtn = document.querySelector('.banner-next');

            if (prevBtn) {
                prevBtn.addEventListener('click', function() {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    currentIndex--;
                    if (currentIndex < 0) {
                        // 先跳到克隆的最后一屏，再动画回到真正的最后一屏
                        currentIndex = totalOriginal - 1;
                        goToSlide(totalOriginal + currentIndex, false);
                        setTimeout(function() {
                            goToSlide(currentIndex);
                            updateDots(currentIndex);
                            setTimeout(function() { isTransitioning = false; }, 650);
                        }, 50);
                    } else {
                        goToSlide(currentIndex);
                        updateDots(currentIndex);
                        setTimeout(function() { isTransitioning = false; }, 650);
                    }
                    stopAutoPlay();
                    startAutoPlay();
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function() {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    currentIndex++;
                    goToSlide(currentIndex);
                    updateDots(currentIndex);
                    if (currentIndex >= totalOriginal) {
                        setTimeout(function() {
                            currentIndex = currentIndex % totalOriginal;
                            goToSlide(currentIndex, false);
                            updateDots(currentIndex);
                            isTransitioning = false;
                        }, 650);
                    } else {
                        setTimeout(function() { isTransitioning = false; }, 650);
                    }
                    stopAutoPlay();
                    startAutoPlay();
                });
            }

            // 鼠标悬停暂停
            var banner = document.querySelector('.hero-banner');
            if (banner) {
                banner.addEventListener('mouseenter', stopAutoPlay);
                banner.addEventListener('mouseleave', startAutoPlay);
            }

            // 初始状态
            goToSlide(0, false);
            updateDots(0);
            startAutoPlay();
        }

        // 热门课程横向滚动初始化（已注释掉，模块暂不启用）

        // 精彩回顾横向滚动初始化
        function initReviewScroll() {
            const leftBtn = document.getElementById('reviewScrollLeft');
            const rightBtn = document.getElementById('reviewScrollRight');
            const track = document.getElementById('reviewTrack');
            
            if (!leftBtn || !rightBtn || !track) return;
            
            // 避免重复绑定
            if (leftBtn.dataset.bound === 'true') return;
            leftBtn.dataset.bound = 'true';
            rightBtn.dataset.bound = 'true';
            
            let scrollPos = 0;
            const cardWidth = 344; // 图片卡片宽度320px + gap 24px
            
            leftBtn.addEventListener('click', () => {
                scrollPos = Math.max(0, scrollPos - cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            rightBtn.addEventListener('click', () => {
                const maxScroll = track.scrollWidth - track.clientWidth;
                scrollPos = Math.min(maxScroll, scrollPos + cardWidth);
                track.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            
            // 同步滚动位置（用户手动拖动时）
            track.addEventListener('scroll', () => {
                scrollPos = track.scrollLeft;
            });
        }

        // 页面初始化时默认加载首页，支持URL hash导航
        window.onload = () => {
            const hash = window.location.hash.substring(1); // 移除#号
            
            // 检查是否是带领域的企业定制课程hash（如 enterprise-chain-stores）
            if (hash && hash.startsWith('enterprise-')) {
                const domainId = hash.replace('enterprise-', '');
                
                // 先切换到企业定制课程Tab
                switchMainTab('enterprise');
                
                // 等待Tab内容加载完成后，激活对应的领域Tab并滚动到该区域
                setTimeout(() => {
                    activateEnterpriseDomain(domainId);
                }, 500);
            } else {
                const targetTab = ['home', 'public', 'enterprise', 'online', 'about'].includes(hash) ? hash : 'home';
                switchMainTab(targetTab);
            }
        };
        
        // 激活企业定制课程的指定领域Tab
        function activateEnterpriseDomain(domainId) {
            // 领域ID到Tab按钮索引的映射
            const domainIndexMap = {
                'manufacturing': 0,      // 制造业&电商
                'chain-stores': 1,       // 连锁门店
                'marketing': 2,          // 大营销
                'strategy': 3,           // 战略与经营管理
                'talent-finance': 4,     // 人才组织发展与财务&教培金融
                'management': 5          // 通用管理领导力与办公提效
            };
            
            const tabIndex = domainIndexMap[domainId];
            if (tabIndex === undefined) return;
            
            // 获取所有Tab按钮和内容块
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');
            
            if (!tabButtons[tabIndex] || !tabContents[tabIndex]) return;
            
            // 切换Tab
            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));
            
            tabButtons[tabIndex].classList.add('active');
            tabContents[tabIndex].classList.add('active');
            
            // 滚动到该领域区域
            tabContents[tabIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
